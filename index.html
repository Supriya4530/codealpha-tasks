
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Frontend Projects</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background-color: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1000px;
      width: 100%;
    }

    .project-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-decoration: none;
      color: #333;
      display: block;
    }

    .project-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }

    .project-icon {
      font-size: 3em;
      margin-bottom: 10px;
    }

    .project-title {
      font-size: 1.2em;
      font-weight: bold;
      margin: 0;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: rgba(0,0,0,0.1);
      color: white;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2em;
      }
      .projects-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>My Frontend Projects</h1>
  </header>

  <main>
    <div class="projects-grid">
      <a href="Task 1/index.html" class="project-card">
        <div class="project-icon">📸</div>
        <h2 class="project-title">Image Gallery</h2>
      </a>
      <a href="Task 2/index.html" class="project-card">
        <div class="project-icon">🧮</div>
        <h2 class="project-title">Calculator</h2>
      </a>
      <a href="Task 3/index.html" class="project-card">
        <div class="project-icon">💼</div>
        <h2 class="project-title">Portfolio</h2>
      </a>
      <a href="task 4/index.html" class="project-card">
        <div class="project-icon">🎵</div>
        <h2 class="project-title">Music Player</h2>
      </a>
    </div>
  </main>

  <footer>
    <p>&copy; 2024 My Frontend Projects. Built with HTML & CSS.</p>
  </footer>
</body>
</html>
