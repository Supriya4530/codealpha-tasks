
<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }

    .calculator {
      width: 280px;
      padding: 20px;
      background: #222;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    #display {
      width: 100%;
      height: 50px;
      margin-bottom: 15px;
      text-align: right;
      font-size: 24px;
      font-weight: bold;
      padding: 10px;
      box-sizing: border-box;
      background: #333;
      color: #fff;
      border: 2px solid #444;
      border-radius: 5px;
    }

    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      height: 50px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #444;
      color: #fff;
      transition: background 0.2s;
    }

    button:hover {
      background: #555;
    }

    button:active {
      background: #666;
      transform: scale(0.98);
    }

    .operator {
      background: #ff9500;
    }

    .operator:hover {
      background: #ffb143;
    }

    .equals {
      background: #4CAF50;
      grid-column: span 2;
    }

    .equals:hover {
      background: #66BB6A;
    }

    .clear {
      background: #f44336;
    }

    .clear:hover {
      background: #ef5350;
    }
  </style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" value="0" disabled>

  <div class="buttons-grid">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="operator" onclick="appendOperator('/')">/</button>
    <button class="operator" onclick="appendOperator('*')">×</button>
    <button class="operator" onclick="appendOperator('-')">−</button>

    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button class="operator" onclick="appendOperator('+')">+</button>

    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>

    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>

    <button onclick="appendNumber('0')">0</button>
    <button onclick="appendDecimal()">.</button>
    <button class="equals" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let display = document.getElementById("display");
  let previousValue = "";
  let operator = null;
  let newNumber = true;

  function appendNumber(num) {
    if (newNumber) {
      display.value = num;
      newNumber = false;
    } else {
      if (display.value === "0") {
        display.value = num;
      } else {
        display.value += num;
      }
    }
  }

  function appendOperator(op) {
    let currentValue = display.value;
    
    if (operator !== null && !newNumber) {
      calculate();
      currentValue = display.value;
    }
    
    previousValue = currentValue;
    operator = op;
    newNumber = true;
  }

  function appendDecimal() {
    if (newNumber) {
      display.value = "0.";
      newNumber = false;
    } else if (!display.value.includes(".")) {
      display.value += ".";
    }
  }

  function clearDisplay() {
    display.value = "0";
    previousValue = "";
    operator = null;
    newNumber = true;
  }

  function calculate() {
    if (operator === null || newNumber) return;

    let currentValue = parseFloat(display.value);
    let result;

    switch (operator) {
      case "+":
        result = parseFloat(previousValue) + currentValue;
        break;
      case "-":
        result = parseFloat(previousValue) - currentValue;
        break;
      case "*":
        result = parseFloat(previousValue) * currentValue;
        break;
      case "/":
        result = parseFloat(previousValue) / currentValue;
        break;
      default:
        return;
    }

    display.value = Math.round(result * 100000000) / 100000000;
    operator = null;
    newNumber = true;
  }
</script>

</body>
</html>
