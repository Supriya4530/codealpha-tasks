
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Image Gallery</title>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        margin: 0;
      }

      h1 {
        padding: 20px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
        padding: 20px;
      }

      .gallery img {
        width: 100%;
        cursor: pointer;
        transition: transform 0.3s ease;
        border-radius: 8px;
      }

      .gallery img:hover {
        transform: scale(1.05);
      }

      .lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .lightbox img {
        max-width: 80%;
        max-height: 80%;
        border-radius: 10px;
        object-fit: contain;
      }

      .lightbox .nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: none;
        font-size: 2rem;
        cursor: pointer;
        padding: 10px;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s;
      }

      .lightbox .nav:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      .lightbox .prev {
        left: 20px;
      }

      .lightbox .next {
        right: 20px;
      }

      .lightbox .close {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: none;
        font-size: 2rem;
        cursor: pointer;
        padding: 10px;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s;
      }

      .lightbox .close:hover {
        background: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>

  <body>
    <h1>Image Gallery</h1>

    <div class="gallery">
      <img
        src="https://picsum.photos/id/1015/400"
        alt="Beautiful landscape"
        onclick="openLightbox(this)"
      />
      <img
        src="https://picsum.photos/id/1016/400"
        alt="City skyline"
        onclick="openLightbox(this)"
      />
      <img
        src="https://picsum.photos/id/1018/400"
        alt="Nature scene"
        onclick="openLightbox(this)"
      />
      <img
        src="https://picsum.photos/id/1020/400"
        alt="Abstract art"
        onclick="openLightbox(this)"
      />
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
      <button class="nav prev" onclick="changeImage(-1); event.stopPropagation();">&#10094;</button>
      <img id="lightbox-img" />
      <button class="nav next" onclick="changeImage(1); event.stopPropagation();">&#10095;</button>
      <button class="close" onclick="closeLightbox(); event.stopPropagation();">&times;</button>
    </div>

    <script>
      let currentImageIndex = 0;
      const images = document.querySelectorAll('.gallery img');

      function openLightbox(img) {
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");
        lightbox.style.display = "flex";
        lightboxImg.src = img.src;
        currentImageIndex = Array.from(images).indexOf(img);
      }

      function closeLightbox() {
        document.getElementById("lightbox").style.display = "none";
      }

      function changeImage(direction) {
        currentImageIndex += direction;
        if (currentImageIndex < 0) {
          currentImageIndex = images.length - 1;
        } else if (currentImageIndex >= images.length) {
          currentImageIndex = 0;
        }
        document.getElementById("lightbox-img").src = images[currentImageIndex].src;
      }

      // Keyboard navigation
      document.addEventListener('keydown', function(event) {
        const lightbox = document.getElementById("lightbox");
        if (lightbox.style.display === "flex") {
          if (event.key === "ArrowLeft") {
            changeImage(-1);
          } else if (event.key === "ArrowRight") {
            changeImage(1);
          } else if (event.key === "Escape") {
            closeLightbox();
          }
        }
      });
    </script>
  </body>
</html>
